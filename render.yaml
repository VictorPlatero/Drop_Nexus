services:
  - type: web
    name: drop-nexus
    runtime: node
    repo: https://github.com/VictorPlatero/Drop_Nexus.git
    branch: main
    rootDir: .
    plan: free
    region: oregon
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    healthCheckPath: /api/status
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: MAX_DATABASE_FILE_SIZE_MB
        value: "500"
      - key: ADMIN_EMAIL
        value: victorplateromaron58@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Victor Platero
